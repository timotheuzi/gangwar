{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Dialogue with {{ npc.name }}</h2>
    
    <div class="card mt-4">
        <div class="card-header">
            <h5>{{ question }}</h5>
        </div>
        <div class="card-body">
            <p class="text-muted">The NPC considers your question and responds based on your reputation and current situation...</p>
            
            <form action="{{ url_for('npc_dialogue_respond', npc_id=npc.id) }}" method="POST">
                <input type="hidden" name="topic" value="{{ topic }}">
                
                <div class="alert alert-info">
                    <p><strong>{{ npc.name }}:</strong> "Based on your current situation, I have this to say..."</p>
                </div>
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Get Response</button>
                    <a href="{{ url_for('npc_dialogue', npc_id=npc.id) }}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
    
    <div class="mt-4">
        <a href="{{ url_for('city') }}" class="btn btn-secondary">Back to City</a>
    </div>
</div>
{% endblock %}
